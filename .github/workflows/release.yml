name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Configure aarch64 musl linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "rust-lld"
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/translate-patcher dist/
          tar -C dist -czf translate-patcher-${{ github.ref_name }}-${{ matrix.target }}.tar.gz translate-patcher

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/translate-patcher.exe dist/
          Compress-Archive -Path dist/translate-patcher.exe -DestinationPath translate-patcher-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Checksums
        shell: bash
        run: |
          if ls *.tar.gz >/dev/null 2>&1; then sha256sum *.tar.gz > checksums-${{ matrix.target }}.txt; fi
          if ls *.zip >/dev/null 2>&1; then sha256sum *.zip > checksums-${{ matrix.target }}.txt; fi

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            translate-patcher-${{ github.ref_name }}-${{ matrix.target }}.*
            checksums-${{ matrix.target }}.txt
