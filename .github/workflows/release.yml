name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Configure aarch64 musl linker
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "rust-lld"
          EOF

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/translate-patcher dist/translate-patcher
          tar -C dist -czf dist/translate-patcher-${{ github.ref_name }}-${{ matrix.target }}.tar.gz translate-patcher

      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/translate-patcher.exe dist/
          Compress-Archive -Path dist/translate-patcher.exe -DestinationPath dist/translate-patcher-${{ github.ref_name }}-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: translate-patcher-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        shell: bash
        run: |
          cd dist
          sha256sum translate-patcher-${{ github.ref_name }}-* > checksums.txt
          for archive in translate-patcher-${{ github.ref_name }}-*; do
            target="${archive#translate-patcher-${{ github.ref_name }}-}"
            target="${target%.tar.gz}"
            target="${target%.zip}"
            grep "  ${archive}$" checksums.txt > "checksums-${target}.txt"
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/translate-patcher-${{ github.ref_name }}-*
            dist/checksums*.txt
